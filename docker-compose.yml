version: '3.8'

services:
  backend:
    build: .
    ports:
      - "8000:8000"
    environment:
      # Pass GROQ_API_KEY from the host .env file
      - GROQ_API_KEY=${GROQ_API_KEY}
    volumes:
      # Mount vectorstore so it persists or can be updated without rebuilding
      - ./vectorstore:/app/vectorstore
      # (Optional) Mount ingestion script if you want to run it inside
      - ./scraper:/app/scraper
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # For local Docker usage, the browser (client) connects to localhost
        - VITE_API_URL=http://localhost:8000
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
